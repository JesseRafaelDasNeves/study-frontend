<div class="flex flex-col gap-4">
  <div class="flex flex-col items-center gap-4">
    <div
      class="border border-surface rounded-full p-2 w-24 h-24 flex items-center justify-center"
    >
      <i class="pi pi-user" style="font-size: 4rem"></i>
    </div>
    <div class="flex flex-col items-center gap-1">
      <div class="font-medium text-lg">{{ form.get("name")?.value }}</div>
      <div class="text-sm text-muted-color">{{ form.get("email")?.value }}</div>
    </div>
  </div>
  <div class="border-t border-surface pt-4">
    <button
      type="button"
      class="w-full flex items-center gap-3 p-3 rounded-md hover:bg-surface-100 dark:hover:bg-surface-800 transition-colors"
    >
      <i class="pi pi-cog"></i>
      <span>Configurações</span>
    </button>

    <button
      type="button"
      class="w-full flex items-center gap-3 p-3 rounded-md hover:bg-surface-100 dark:hover:bg-surface-800 transition-colors"
      (click)="logout()"
    >
      <i class="pi pi-sign-out"></i>
      <span>Sair</span>
    </button>
  </div>
